<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OurA11y Basic Example</title>
    <style>
      body {
        font-family: Georgia, serif;
        margin: 0;
        line-height: 1.5;
        color: #1e293b;
        background: linear-gradient(180deg, #f8fafc, #eef2f7);
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 96px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 16px;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Basic embed example</h1>
        <p>
          This page shows the default widget, preference persistence, safe enhancements, and
          optional diagnostics.
        </p>
        <button aria-label="Add item">
          <svg width="20" height="20" viewBox="0 0 20 20" aria-hidden="true" focusable="false">
            <circle cx="10" cy="10" r="9" fill="#0f5bd8"></circle>
            <path d="M10 5v10M5 10h10" stroke="#ffffff" stroke-width="2" stroke-linecap="round"></path>
          </svg>
        </button>
        <p><a href="https://a11y.itisuniqueofficial.com/">Read more</a></p>
        <input type="email" placeholder="Email address" />
      </div>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
  </html>
