<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OurA11y Basic Example</title>
    <style>
      body {
        font-family: Georgia, serif;
        margin: 0;
        line-height: 1.5;
        color: #1e293b;
        background: linear-gradient(180deg, #f8fafc, #eef2f7);
      }
      main {
        max-width: 760px;
        margin: 0 auto;
        padding: 48px 20px 96px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #d7dee8;
        border-radius: 16px;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="card">
        <h1>Basic embed example</h1>
        <p>
          This page shows the default widget, preference persistence, safe enhancements, and
          optional diagnostics.
        </p>
        <button><img src="https://via.placeholder.com/20" alt="Add item" /></button>
        <p><a href="https://example.com">Read more</a></p>
        <input type="email" placeholder="Email address" />
      </div>
    </main>
    <script type="module" src="/src/index.ts"></script>
  </body>
  </html>
